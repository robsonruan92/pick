apiVersion: v1
kind: Pod
metadata:
  labels:
    run: giropops
  name: giropops
spec:
  containers:
    - name: webserver
      image: nginx
      volumeMounts:
        - mountPath: /giropops
          name: primeiro-emptydir
      resources:
        limits:
          cpu: "1"
          memory: "128Mi"
        requests:
          cpu: "0.5"
          memory: "64Mi"
  volumes:
    - name: primeiro-emptydir
      emptyDir:
        sizeLimit: 256Mi
  dnsPolicy: ClusterFirst
  restartPolicy: Always
